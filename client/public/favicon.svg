<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Base black circle with thick white border -->
    <circle cx="50" cy="50" r="40" fill="black" stroke="white" stroke-width="2.5" />
    
    <!-- Inner grid lines (White) -->
    <!-- Latitudes -->
    <path d="M 15 30 Q 50 38 85 30" stroke="white" stroke-width="3" fill="none"/>
    <path d="M 15 70 Q 50 62 85 70" stroke="white" stroke-width="3" fill="none"/>
    
    <!-- Longitudes -->
    <!-- Center -->
    <line x1="50" y1="10" x2="50" y2="90" stroke="white" stroke-width="3"/>
    <!-- Left -->
    <path d="M 50 10 Q 23 50 50 90" stroke="white" stroke-width="3" fill="none"/>
    <!-- Right -->
    <path d="M 50 10 Q 77 50 50 90" stroke="white" stroke-width="3" fill="none"/>

    <!-- Middle black band to cover the grid and hold the text -->
    <rect x="6" y="34" width="88" height="32" fill="black" stroke="white" stroke-width="2.5"/>
  </g>

  <!-- HACK Text in pixel blocks -->
  <g fill="white">
    <!-- H -->
    <rect x="14" y="40" width="4" height="20" />
    <rect x="24" y="40" width="4" height="20" />
    <rect x="18" y="48" width="6" height="4" />
    
    <!-- A -->
    <rect x="32" y="40" width="12" height="4" />
    <rect x="32" y="44" width="4" height="16" />
    <rect x="40" y="44" width="4" height="16" />
    <rect x="36" y="48" width="4" height="4" />
    
    <!-- C -->
    <rect x="48" y="40" width="12" height="4" />
    <rect x="48" y="44" width="4" height="12" />
    <rect x="48" y="56" width="12" height="4" />
    
    <!-- K -->
    <rect x="64" y="40" width="4" height="20" />
    <rect x="68" y="48" width="4" height="4" />
    <rect x="72" y="44" width="4" height="4" />
    <rect x="76" y="40" width="4" height="4" />
    <rect x="72" y="52" width="4" height="4" />
    <rect x="76" y="56" width="4" height="4" />
  </g>
</svg>
